name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.1)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: github.repository == 'MukundaKatta/agenttrace'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package.json version
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${tag#v}"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ($tag_version) does not match package.json version ($pkg_version). Refusing to publish."
            exit 1
          fi

      - name: Verify zero runtime dependencies
        run: |
          node -e '
            const pkg = require("./package.json");
            const deps = pkg.dependencies || {};
            if (Object.keys(deps).length > 0) {
              console.error("Refusing to release: agenttrace should have zero runtime deps; lists: " + Object.keys(deps).join(", "));
              process.exit(1);
            }
          '

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Runnable examples (smoke)
        run: npm run test:examples

      - name: Cost-under-reporting smoke
        run: |
          node --input-type=module -e '
            import { costOf, PRICING } from "./src/index.js";
            const cost = costOf("claude-sonnet-4", { input: 1_000_000, output: 1_000_000 });
            const rate = PRICING["claude-sonnet-4"];
            const expected = rate.input + rate.output;
            if (typeof cost !== "number" || !Number.isFinite(cost) || cost < expected) {
              console.error("FAIL: cost under-reported at release time (" + cost + " < " + expected + "). Refusing to publish.");
              process.exit(1);
            }
          '

      - name: Coverage gate
        run: npm run test:coverage

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${{ steps.tag.outputs.ref }}"
          version="${tag#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG section for $version; using generic notes."
            echo "Release $tag of @mukundakatta/agenttrace." > /tmp/release-notes.md
          fi
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
